name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build-cmd: npx electron-builder --mac
            artifact-pattern: "*.dmg"
            artifact-name: ketcher-macos
          - os: windows-latest
            build-cmd: npx electron-builder --win
            artifact-pattern: "*.exe"
            artifact-name: ketcher-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages
            example
            demo
            desktop
            scripts
            package.json
            package-lock.json
            LICENSE
            NOTICE
            .eslintrc.json
            .prettierrc.js
            .stylelintrc.json
            .stylelintignore
            .lintstagedrc.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Ketcher
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Copy standalone build
        working-directory: desktop
        run: npx shx cp -r ../example/dist/standalone app

      - name: Build installer
        working-directory: desktop
        run: ${{ matrix.build-cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: desktop/dist/${{ matrix.artifact-pattern }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          name: Ketcher Desktop ${{ github.ref_name }}
          body: |
            Ketcher chemical structure editor as a native desktop application.

            ## Downloads
            - **macOS**: Universal binary DMG (Intel + Apple Silicon)
            - **Windows**: 64-bit NSIS installer

            Built with Electron 33. Runs in standalone mode (no backend required).

            Licensed under Apache License 2.0. See LICENSE and NOTICE files included in the installers.
          files: |
            artifacts/ketcher-macos/*
            artifacts/ketcher-windows/*
